<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Edit Product - Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-slate-900 antialiased selection:bg-primary/30">
<div class="relative flex min-h-screen flex-col mx-auto max-w-md bg-white shadow-2xl overflow-hidden">
<!-- Header -->
<header class="sticky top-0 z-20 flex items-center justify-between bg-white/90 backdrop-blur-md px-4 py-3 border-b border-slate-100">
<button class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-slate-700 hover:bg-slate-100 transition-colors" type="button">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-900 truncate px-2">Edit Product</h1>
<button class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-slate-700 hover:bg-slate-100 transition-colors" type="button">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-32">
<div class="flex flex-col gap-8 px-4 py-6">
<!-- Basic Info Section -->
<section class="flex flex-col gap-4">
<h2 class="text-xl font-bold tracking-tight text-slate-900">Basic Info</h2>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="product-name">Product Name</label>
<input class="w-full rounded-xl border-slate-200 bg-background-light px-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="product-name" type="text" value="Handmade Crochet Daisy Bouquet"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700" for="description">Description</label>
<span class="text-xs text-slate-500">Rich Text</span>
</div>
<textarea class="w-full resize-none rounded-xl border-slate-200 bg-background-light px-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="description" rows="5">Beautiful, handmade crochet daisy bouquet. Crafted with premium cotton yarn, these everlasting flowers are perfect for gifting, home decor, or special occasions.</textarea>
</div>
</section>
<hr class="border-slate-100"/>
<!-- Media Section -->
<section class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="text-xl font-bold tracking-tight text-slate-900">Media</h2>
<span class="text-sm font-medium text-slate-500">3 of 8 max</span>
</div>
<!-- Drag & Drop Area -->
<div class="flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-200 bg-background-light px-6 py-10 text-center transition-colors hover:border-primary/50 hover:bg-primary/5 cursor-pointer">
<div class="mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-white shadow-sm">
<span class="material-symbols-outlined text-primary text-2xl">add_photo_alternate</span>
</div>
<p class="text-sm font-semibold text-slate-900">Tap to upload photos</p>
<p class="mt-1 text-xs text-slate-500">JPG, PNG, WEBP up to 5MB</p>
</div>
<!-- Thumbnails Row -->
<div class="flex gap-3 overflow-x-auto pb-2 snap-x hide-scrollbar" style="scrollbar-width: none;">
<!-- Primary Image -->
<div class="relative h-28 w-28 shrink-0 snap-start rounded-xl overflow-hidden border border-slate-200 shadow-sm group">
<img alt="Crochet daisy bouquet front view" class="h-full w-full object-cover" data-alt="Crochet daisy bouquet front view" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZa_lyuybFdpnEqjp9XtWaCv1Tlei3ORc3B-KIx5LItWNowkHdgXZVES7irg0MydstpFkGzuzQd-efLvoinXWTc5UeAtgWdkkrHRRl4ivSEf9D1fKgNPXKHN3TSazT_NeJ8MBKR-lFiw8NjP9R0WDhMqKrmXbs0kH9u_tvUti1gYiK9MRT6hbIblW0JrUcNtgNW0Afcxa07lFur7W_BnwN2MwxXFS3wXb2ootXj9JOfNEvmA6FyEWGucXTdE3BjxRgZhFQ9Sg1pC3A"/>
<div class="absolute top-1.5 left-1.5 rounded bg-white/90 px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider text-slate-800 backdrop-blur-sm">
                                Main
                            </div>
<button class="absolute top-1.5 right-1.5 flex h-6 w-6 items-center justify-center rounded-full bg-white/90 text-slate-700 shadow-sm backdrop-blur-sm hover:text-red-500">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<!-- Secondary Images -->
<div class="relative h-28 w-28 shrink-0 snap-start rounded-xl overflow-hidden border border-slate-200 shadow-sm">
<img alt="Crochet daisy close up detail" class="h-full w-full object-cover opacity-90" data-alt="Crochet daisy close up detail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR01z97vIH6EIFH2WL4gAb6XuGw8epCfPjXS74YVUcOQM4Kj7JNTbdin268J97FWir-ZxmKuCGTxROMZfY-VlaQ9EpR49EbxfkKUtANsGhRplDF2pK6Sy90SkeZ48eNz2U0oF4RiPiDrz9POSuL-xYpEQaRIIwUoz86luLR9x2KBnAmQp7hFFiV9eLjhx3QYt2W2X_O8SMIMlpdpHDWxcqFqits2OXKEb_UAJPSlXoFMuMvBJ1NhLxjxNBQMz7GiyZy9LnCE5qoZXf"/>
<button class="absolute top-1.5 right-1.5 flex h-6 w-6 items-center justify-center rounded-full bg-white/90 text-slate-700 shadow-sm backdrop-blur-sm hover:text-red-500">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<div class="relative h-28 w-28 shrink-0 snap-start rounded-xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-300 text-3xl">image</span>
</div>
</div>
</section>
<hr class="border-slate-100"/>
<!-- Pricing Section -->
<section class="flex flex-col gap-4">
<h2 class="text-xl font-bold tracking-tight text-slate-900">Pricing</h2>
<div class="flex gap-4">
<div class="flex flex-1 flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="price">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">$</span>
<input class="w-full rounded-xl border-slate-200 bg-background-light pl-8 pr-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="price" step="0.01" type="number" value="45.00"/>
</div>
</div>
<div class="flex flex-1 flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="compare-price">Compare-at Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">$</span>
<input class="w-full rounded-xl border-slate-200 bg-background-light pl-8 pr-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="compare-price" step="0.01" type="number" value="55.00"/>
</div>
</div>
</div>
</section>
<hr class="border-slate-100"/>
<!-- Inventory & Categories -->
<section class="flex flex-col gap-6">
<h2 class="text-xl font-bold tracking-tight text-slate-900 hidden">Details</h2>
<div class="flex gap-4">
<div class="flex flex-1 flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="sku">SKU</label>
<input class="w-full rounded-xl border-slate-200 bg-background-light px-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="sku" type="text" value="BQT-DAISY-01"/>
</div>
<div class="flex flex-1 flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="quantity">Quantity</label>
<input class="w-full rounded-xl border-slate-200 bg-background-light px-4 py-3.5 text-base text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="quantity" type="number" value="12"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700" for="category">Category</label>
<div class="relative">
<select class="w-full appearance-none rounded-xl border-slate-200 bg-background-light px-4 py-3.5 text-base text-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all pr-10" id="category">
<option selected="" value="bouquets">Bouquets</option>
<option value="amigurumi">Amigurumi</option>
<option value="accessories">Accessories</option>
<option value="clothing">Clothing</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">expand_more</span>
</div>
</div>
</section>
</div>
</main>
<!-- Sticky Bottom Bar -->
<div class="absolute bottom-0 left-0 right-0 z-30 bg-white border-t border-slate-100 px-4 pt-4 pb-8 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<button class="w-full flex items-center justify-center rounded-xl bg-primary py-4 text-base font-bold text-slate-900 shadow-sm transition-transform active:scale-[0.98] hover:bg-[#10d473]" type="button">
                Save Changes
            </button>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login Portal</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221015",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20 selection:text-primary">
<div class="min-h-screen flex flex-col justify-center px-6 py-12 relative overflow-hidden">
<!-- Subtle background accent -->
<div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none"></div>
<div class="w-full max-w-[400px] mx-auto relative z-10">
<!-- Branding / Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 text-primary mb-5 ring-1 ring-primary/20 shadow-sm">
<span class="material-symbols-outlined text-[32px]">storefront</span>
</div>
<h1 class="text-2xl font-bold tracking-tight mb-1">PHOOLVIAA</h1>
<p class="text-sm font-medium tracking-widest uppercase text-slate-500 dark:text-slate-400">Admin Portal</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-black/20 p-8 rounded-[2rem] shadow-xl shadow-slate-200/40 dark:shadow-none ring-1 ring-slate-100 dark:ring-white/5 backdrop-blur-sm">
<div class="mb-8 text-center">
<h2 class="text-xl font-semibold mb-1.5">Welcome Back</h2>
<p class="text-sm text-slate-500 dark:text-slate-400">Log in to manage your platform.</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-12 pl-11 pr-4 rounded-xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-black/40 text-sm focus:bg-white dark:focus:bg-black/60 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="admin@phoolviaa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-12 pl-11 pr-12 rounded-xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-black/40 text-sm focus:bg-white dark:focus:bg-black/60 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-3">
<button class="w-full h-12 rounded-xl bg-primary text-white font-medium hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20" type="button">
                            Sign In
                            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="mt-8 flex items-center justify-center gap-1.5 text-xs text-slate-400 dark:text-slate-500 font-medium">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span>Secure Admin Environment</span>
</div>
</div>
</div>
</body></html>
